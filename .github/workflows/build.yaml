---
name: build
on:
  push:
    paths:
      - .github/workflows/build.yaml
      - proposal/**
jobs:
  proposal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.14.2"
      - name: compile proposal in typst
        run: >-
          typst compile
          --root .
          --font-path proposal/fonts
          proposal/main.typ
          proposal/main.pdf
      - name: upload
        uses: actions/upload-artifact@v7
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        with:
          path: proposal/main.pdf
          name: proposal
          retention-days: 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: rename
        run: mv proposal/main.pdf proposal.pdf
      - name: release
        uses: ncipollo/release-action@v1
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          artifact: proposal.pdf
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
